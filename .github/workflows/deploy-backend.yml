name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: sapagentregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          SHA=${{ github.sha }}
          docker build -t sapagentregistry.azurecr.io/sap-agent:$SHA ./backend
          docker tag sapagentregistry.azurecr.io/sap-agent:$SHA sapagentregistry.azurecr.io/sap-agent:latest
          docker push sapagentregistry.azurecr.io/sap-agent:$SHA
          docker push sapagentregistry.azurecr.io/sap-agent:latest

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name sap-agent \
            --resource-group sap-agent-rg \
            --image sapagentregistry.azurecr.io/sap-agent:${{ github.sha }}